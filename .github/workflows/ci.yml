name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - anthropic
          - cohere
          - google
          - openai
          - openaicompatible
          - openrouter
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            */go.sum

      - name: Check formatting
        if: matrix.module == '.'
        run: test -z "$(gofmt -l .)"

      - name: Run tests
        working-directory: ${{ matrix.module }}
        run: go test ./...

      - name: Run race tests
        working-directory: ${{ matrix.module }}
        run: go test -race ./...

      - name: Run go vet
        working-directory: ${{ matrix.module }}
        run: go vet ./...

  staticcheck:
    name: Staticcheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - anthropic
          - cohere
          - google
          - openai
          - openaicompatible
          - openrouter
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            */go.sum

      - name: Run staticcheck
        working-directory: ${{ matrix.module }}
        run: go run honnef.co/go/tools/cmd/staticcheck@v0.7.0 ./...

  govulncheck:
    name: Govulncheck (${{ matrix.module }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        module:
          - .
          - anthropic
          - cohere
          - google
          - openai
          - openaicompatible
          - openrouter
    env:
      GOPRIVATE: github.com/shepard-labs/*
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: ${{ matrix.module }}/go.mod
          cache: true
          cache-dependency-path: |
            go.sum
            */go.sum

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        continue-on-error: true
        working-directory: ${{ matrix.module }}
        run: govulncheck ./...

  release:
    name: Release
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test, staticcheck]
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git tag | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -1 || true)
          if [ -z "$LATEST_TAG" ]; then
            VERSION="v1.0.0"
          else
            MAJOR=$(echo "$LATEST_TAG" | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo "$LATEST_TAG" | cut -d. -f2)
            PATCH=$(echo "$LATEST_TAG" | cut -d. -f3)
            PATCH=$((PATCH + 1))
            VERSION="v${MAJOR}.${MINOR}.${PATCH}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Release
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          TAGS=(
            "$VERSION"
            "anthropic/$VERSION"
            "cohere/$VERSION"
            "google/$VERSION"
            "openai/$VERSION"
            "openaicompatible/$VERSION"
            "openrouter/$VERSION"
          )
          for tag in "${TAGS[@]}"; do
            git tag "$tag" "$GITHUB_SHA"
          done
          git push origin "${TAGS[@]}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
